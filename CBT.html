<script>

// ===== QUESTIONS ARRAY =====
const questions = [];

// ===== ENGLISH (60 HARD) =====
for(let i=1;i<=60;i++){
  questions.push({
    subject:"English",
    q:[
      "Choose the word that is nearest in meaning: 'Loquacious'",
      "Choose the correct interpretation: He kicked the bucket.",
      "Identify the grammatically correct sentence.",
      "Choose the word opposite in meaning to 'Ubiquitous'",
      "Fill in the blank: Neither John nor his friends ___ coming.",
    ][i%5],

    options:[
      ["Talkative","Silent","Angry","Proud"],
      ["He died","He ran","He fell","He jumped"],
      ["She don't like rice","She doesn't likes rice","She doesn't like rice","She not like rice"],
      ["Rare","Everywhere","Common","Frequent"],
      ["is","are","were","be"]
    ][i%5],

    answer:[0,0,2,0,0][i%5]
  });
}

// ===== GOVERNMENT (15 HARD) =====
for(let i=1;i<=15;i++){
  questions.push({
    subject:"Government",
    q:[
      "Who propounded the theory of Separation of Powers?",
      "The upper chamber of Nigeria’s legislature is called?",
      "A constitution that can be easily amended is?",
      "Which system allows citizens vote directly?",
      "Rule of law was popularized by?"
    ][i%5],

    options:[
      ["Montesquieu","Locke","Hobbes","Rousseau"],
      ["Senate","House","Assembly","Council"],
      ["Flexible","Rigid","Written","Unwritten"],
      ["Direct democracy","Monarchy","Oligarchy","Dictatorship"],
      ["A.V Dicey","Marx","Lenin","Plato"]
    ][i%5],

    answer:[0,0,0,0,0][i%5]
  });
}

// ===== LITERATURE (15 HARD) =====
for(let i=1;i<=15;i++){
  questions.push({
    subject:"Literature",
    q:[
      "A story with animal characters is called?",
      "The climax of a story refers to?",
      "Who wrote 'Things Fall Apart'?",
      "A figure of speech comparing unlike things using 'like' is?",
      "Tragedy typically ends in?"
    ][i%5],

    options:[
      ["Fable","Myth","Epic","Drama"],
      ["Highest tension","Beginning","Ending","Moral"],
      ["Chinua Achebe","Wole Soyinka","Ngugi","Clark"],
      ["Simile","Metaphor","Irony","Hyperbole"],
      ["Death","Marriage","Victory","Peace"]
    ][i%5],

    answer:[0,0,0,0,0][i%5]
  });
}

// ===== CRS (10 HARD) =====
for(let i=1;i<=10;i++){
  questions.push({
    subject:"CRS",
    q:[
      "Who led Israelites out of Egypt?",
      "The first king of Israel was?",
      "Jesus turned water into wine at?",
      "The book of Revelation was written by?",
      "The fruit of the Spirit includes?"
    ][i%5],

    options:[
      ["Moses","Aaron","Joshua","David"],
      ["Saul","David","Solomon","Samuel"],
      ["Cana","Jericho","Bethlehem","Nazareth"],
      ["John","Peter","Paul","James"],
      ["Love","War","Pride","Jealousy"]
    ][i%5],

    answer:[0,0,0,0,0][i%5]
  });
}

// ===== VARIABLES =====
let current = 0;
let answers = new Array(100).fill(null);

// ===== LOAD =====
function loadQuestion(){
  let q = questions[current];

  document.getElementById("subject").innerText =
    `${q.subject} (${current+1}/100)`;

  document.getElementById("question").innerText = q.q;

  let html = "";
  q.options.forEach((opt,i)=>{
    let sel = answers[current]===i ? "selected":"";
    html += `<div class="option ${sel}" onclick="select(${i})">${opt}</div>`;
  });

  document.getElementById("options").innerHTML = html;

  updatePalette();
}

// ===== SELECT =====
function select(i){
  answers[current] = i;
  loadQuestion();
}

// ===== NAV =====
function next(){
  if(current<99){ current++; loadQuestion(); }
}
function prev(){
  if(current>0){ current--; loadQuestion(); }
}

// ===== PALETTE =====
function updatePalette(){
  let html = "";
  for(let i=0;i<100;i++){
    let cls = "";
    if(i===current) cls="current";
    else if(answers[i]!=null) cls="answered";

    html += `<button class="${cls}" onclick="go(${i})">${i+1}</button>`;
  }
  document.getElementById("palette").innerHTML = html;
}

function go(i){
  current = i;
  loadQuestion();
}

// ===== SUBMIT =====
function submitExam(){
  let score = 0;
  questions.forEach((q,i)=>{
    if(answers[i]===q.answer) score+=4;
  });

  document.getElementById("result").innerText =
    `Final Score: ${score} / 400`;
}

// ===== TIMER =====
let time = 3600;

setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerText =
    `${m}:${s<10?"0"+s:s}`;
  time--;
  if(time<0) submitExam();
},1000);

// START
loadQuestion();

    </script>
