<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zuru Media Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #1a0000;
  --text: #f5e6d3;
}

body.light {
  --bg: #f5e6d3;
  --text: #1a0000;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.4s;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#intro h1 {
  font-size: 3rem;
  color: gold;
  letter-spacing: 5px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% {opacity: 0.3;}
  100% {opacity: 1;}
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.5);
  z-index: 1000;
}

nav ul {
  display: flex;
  gap: 20px;
  list-style: none;
}

nav a {
  text-decoration: none;
  color: var(--text);
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h2 {
  font-size: 3rem;
  font-family: 'Playfair Display';
}

.cursor {
  color: gold;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity: 0;}
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  background: gold;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* SECTION */
section {
  padding: 100px 20px;
  text-align: center;
}

/* PORTFOLIO */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px);
}

/* CONTACT */
input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
}

/* FLOAT BUTTONS */
.float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.float a {
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  color: white;
}

.whatsapp { background: #25D366; }
.top { background: gold; color: black; }

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro"><h1>ZURU MEDIA</h1></div>

<!-- NAV -->
<nav>
  <h2>Zuru</h2>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#portfolio">Portfolio</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <button onclick="toggleMode()">🌗</button>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div>
    <h2 id="typing"></h2><span class="cursor">|</span>
    <button class="btn">Get Started</button>
  </div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio">
  <h2>Portfolio</h2>
  <div class="grid">
    <div class="card">Luxury Brand Website</div>
    <div class="card">Modern UI Design</div>
    <div class="card">Creative Graphics</div>
  </div>
</section>

}-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>

  <form>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Message"></textarea>
    <button class="btn">Send</button>
  </form>

  <p>Email: chijindunicholasdestiny05@gmail.com</p>
</section>

<!-- FLOAT -->
<div class="float">
  <a href="https://wa.me/2348102407071" class="whatsapp">💬</a>
  <a href="#home" class="top">↑</a>
</div>

<script>
// INTRO
setTimeout(()=>document.getElementById("intro").style.display="none",2000);

// TYPING EFFECT
const text = "We Build Elite Digital Brands";
let i = 0;
function type() {
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();

// DARK MODE
function toggleMode(){
  document.body.classList.toggle("light");
}
</script>

</body>
  </html>
