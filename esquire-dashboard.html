<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esquire AI — Zuru Media System</title>

<style>
:root{
    --dark:#0f0f14;
    --panel:#161622;
    --accent:#8B5A2B;
    --text:#f5f5f5;
    --muted:#9aa0a6;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
    background:var(--dark);
    color:var(--text);
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:var(--panel);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-box{
    width:40px;
    height:40px;
    background:var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    font-weight:bold;
}

.nav{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.nav button{
    background:transparent;
    border:1px solid #2a2a3a;
    color:var(--text);
    padding:10px;
    text-align:left;
    cursor:pointer;
    border-radius:8px;
}

.nav button:hover{
    background:var(--accent);
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    padding:15px;
    background:var(--panel);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.badge{
    padding:5px 10px;
    background:var(--accent);
    border-radius:20px;
    font-size:12px;
}

/* CHAT */
.chat{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    padding:10px;
    border-radius:10px;
    max-width:70%;
}

.bot{
    background:#222233;
    align-self:flex-start;
}

.user{
    background:var(--accent);
    align-self:flex-end;
}

.input-box{
    display:flex;
    padding:15px;
    background:var(--panel);
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

button.send{
    background:var(--accent);
    border:none;
    padding:10px 15px;
    color:white;
    cursor:pointer;
    border-radius:8px;
}

/* WHATSAPP */
.wa{
    margin-top:auto;
    padding:10px;
    background:#25D366;
    text-align:center;
    border-radius:8px;
    color:#000;
    font-weight:bold;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <div class="logo-box">E</div>
        <div>
            <div><b>Esquire AI</b></div>
            <small style="color:var(--muted)">Zuru Media System</small>
        </div>
    </div>

    <div class="nav">
        <button>Dashboard</button>
        <button>Clients</button>
        <button>Projects</button>
        <button>AI Assistant</button>
        <button>Analytics</button>
    </div>

    <a class="wa" href="https://wa.me/2348102407071" target="_blank">
        Chat on WhatsApp
    </a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <div><b>Esquire Control Panel</b></div>
        <div class="badge">LIVE AI</div>
    </div>

    <div class="chat" id="chat">
        <div class="msg bot">Hello, I am Esquire — your AI assistant for Zuru Media. How can I help you today?</div>
    </div>

    <div class="input-box">
        <input id="input" placeholder="Type your message..." />
        <button class="send" onclick="sendMsg()">Send</button>
    </div>

</div>

<script>
function sendMsg(){
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let text = input.value;
    if(!text) return;

    // user message
    let userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerText = text;
    chat.appendChild(userMsg);

    // bot response (simple AI logic placeholder)
    let botMsg = document.createElement("div");
    botMsg.className = "msg bot";

    let reply = "";

    if(text.toLowerCase().includes("price")){
        reply = "Our pricing depends on project type. Would you like branding, video editing, or full production?";
    }
    else if(text.toLowerCase().includes("hello")){
        reply = "Hello! Welcome to Esquire AI. How can I assist your creative project today?";
    }
    else if(text.toLowerCase().includes("video")){
        reply = "We can create cinematic, commercial, and social media videos. Tell me your idea.";
    }
    else{
        reply = "I understand. Esquire is processing your request. A team member may follow up via WhatsApp.";
    }

    botMsg.innerText = reply;
    chat.appendChild(botMsg);

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
  </html>
